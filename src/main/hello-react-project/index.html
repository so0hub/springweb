<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hello-react-project</title>
  </head>
  <body>
    <!-- 리액트가 컴파일(JSX 문법을 HTML 변환) 하면 최초 렌더링되는 구역 root -->
    <!-- index.html에 root 1개이다??? SPA 싱글페이지 애플리케이션 , 즉] 하나의 HTML로 JS가 가상(JSX)으로 렌더링한다. -->
    <div id="root"></div>

    <!-- root 대입하는 코드는 main.jsx 파일에서 동적 처리 한다. 즉] main.jsx가 최초 렌더링 코드 포함. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
