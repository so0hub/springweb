<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>박진감 넘치는 블로그 글</title>
    <link rel='stylesheet' href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    
</head>
<body>
    <div class="p-5 mb-5 text-center bg-light">
        <h1 class="mb-3">My Blog</h1>
        <h4 class="mb-4">블로그에 오신 것을 환영합니감.</h4>
    </div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-8">
                <article>
                    <input type="hidden" id="article-id" th:value="${article.id}">

                    <header class="mb-4">
                        <input type="text" class="form-controll" placeholder="제목" id="title"
                        th:value="${article.title}">
                    </header>
                    <section class="mb-5">
                        <textarea class="form-controll h-25" rows="10" placeholder="내용"
                        id="content" th:text="${article.content}"></textarea>
                    </section>
                    <button th:if="${article.id}!=null" type="button" id="modify-btn" class="btn btn-primary btn-sm">수정</button>
                    <button th:if="${article.id}==null" type="button" id="create-btn" class="btn btn-primary btn-sm">수정</button>
                </article>
            </div>
        </div>
    </div>
    <script src="/js/article.js"></script>
</body>
</html>
